name: Diag

# Temporary diagnostic: proves `./gradlew clean build` works using ONLY
# GitHub-owned actions (actions/*), i.e. WITHOUT gradle/actions, which the
# repository's allowed-actions policy currently blocks. Removed after diagnosis.

on:
  push:
    branches:
      - claude/montoya-python3-version-3mfa5x
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Build with the Gradle wrapper (no gradle/actions)
        run: ./gradlew clean build --no-daemon
      - name: Show built jar
        run: ls -l build/libs/
