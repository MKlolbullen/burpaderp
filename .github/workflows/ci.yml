name: CI

# Build and validate on pull requests. No release is published here — that is
# handled by release.yml on pushes to main.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'

      # Build via the Gradle wrapper directly instead of gradle/actions, which
      # the repository's allowed-actions policy blocks (only GitHub-owned
      # actions are permitted). The wrapper pins Gradle 8.14.3 and verifies the
      # distribution checksum (distributionSha256Sum in gradle-wrapper.properties).
      - name: Build
        run: ./gradlew clean build --no-daemon

      - name: Upload jar artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: burp-recon-hound-jar-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
