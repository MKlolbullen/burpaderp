name: CI

# Build and validate on pull requests. No release is published here — that is
# handled by release.yml on pushes to main.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@da187c8e6ffbd3802e00f2477aa5a822b25f2dda # v4.4.4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@da187c8e6ffbd3802e00f2477aa5a822b25f2dda # v4.4.4

      - name: Build
        run: ./gradlew clean build --no-daemon

      - name: Upload jar artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: burp-recon-hound-jar-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
