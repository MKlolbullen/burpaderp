<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" font-family="Segoe UI, Helvetica, Arial, sans-serif"><defs><marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker></defs><rect x="0.5" y="0.5" width="959" height="299" rx="12" fill="#ffffff" stroke="#e2e8f0"/><text x="480.0" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Access-control / IDOR testing (Autorize-style)</text><rect x="30" y="90" width="230" height="90" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/><text x="145.0" y="119.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#0f172a">Privileged request</text><text x="145.0" y="135.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#475569">captured in site map</text><text x="145.0" y="151.0" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="400" fill="#15803d">200 OK · 1024 bytes</text><rect x="30" y="200" width="230" height="78" rx="9" fill="#fff1e6" stroke="#c2410c" stroke-width="1.6"/><text x="145.0" y="223.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#0f172a">Replay: alternate identity</text><text x="145.0" y="239.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#475569">strip auth / low-priv cookie</text><text x="145.0" y="255.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#c2410c">safe methods only</text><line x1="145" y1="180" x2="145" y2="200" stroke="#64748b" stroke-width="1.7" marker-end="url(#ah)"/><rect x="340" y="130" width="180" height="90" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/><text x="430.0" y="167.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#0f172a">Compare</text><text x="430.0" y="183.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#475569">status + length diff</text><line x1="260" y1="135" x2="340" y2="160" stroke="#64748b" stroke-width="1.7" marker-end="url(#ah)"/><line x1="260" y1="235" x2="340" y2="195" stroke="#64748b" stroke-width="1.7" marker-end="url(#ah)"/><rect x="600" y="80" width="330" height="66" rx="9" fill="#e7f6ec" stroke="#15803d" stroke-width="1.6"/><text x="765.0" y="105.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#b91c1c">BYPASSED → HIGH</text><text x="765.0" y="121.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#475569">low-priv identity got the same 200 response</text><rect x="600" y="165" width="330" height="66" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/><text x="765.0" y="190.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#15803d">ENFORCED → info</text><text x="765.0" y="206.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#475569">401/403 or redirect to login</text><line x1="520" y1="155" x2="600" y2="113" stroke="#64748b" stroke-width="1.7" marker-end="url(#ah)"/><line x1="520" y1="185" x2="600" y2="198" stroke="#64748b" stroke-width="1.7" marker-end="url(#ah)"/></svg>