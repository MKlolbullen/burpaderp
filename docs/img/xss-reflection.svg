<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" font-family="Segoe UI, Helvetica, Arial, sans-serif"><defs><marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker></defs><rect x="0.5" y="0.5" width="959" height="299" rx="12" fill="#ffffff" stroke="#e2e8f0"/><text x="480.0" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Passive reflected-XSS surface mapping</text><rect x="30" y="70" width="200" height="70" rx="9" fill="#e8f0fe" stroke="#1a56db" stroke-width="1.6"/><text x="130.0" y="97.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#0f172a">Request parameter</text><text x="130.0" y="113.0" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="400" fill="#475569">q = rhx"&gt;&lt;svg…</text><rect x="30" y="180" width="200" height="78" rx="9" fill="#e8f0fe" stroke="#1a56db" stroke-width="1.6"/><text x="130.0" y="203.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#0f172a">Response body</text><text x="130.0" y="219.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#475569">&lt;script&gt;var x=</text><text x="130.0" y="235.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#475569">"…q…";&lt;/script&gt;</text><line x1="130" y1="140" x2="130" y2="180" stroke="#64748b" stroke-width="1.7" marker-end="url(#ah)"/><rect x="95.4" y="142.0" width="69.19999999999999" height="16" rx="4" fill="#ffffff" opacity="0.9"/><text x="130.0" y="153.0" text-anchor="middle" font-size="10.5" fill="#475569">reflected</text><rect x="300" y="120" width="220" height="90" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/><text x="410.0" y="149.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#0f172a">Context classifier</text><text x="410.0" y="165.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#475569">bounded parser-state scan</text><text x="410.0" y="181.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#1a56db">→ JS string (double-quoted)</text><line x1="230" y1="219" x2="300" y2="175" stroke="#64748b" stroke-width="1.7" marker-end="url(#ah)"/><rect x="590" y="70" width="210" height="76" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/><text x="695.0" y="92.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#0f172a">Surviving chars</text><text x="695.0" y="108.0" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#c2410c">" &lt; &gt; ( ) ; =</text><text x="695.0" y="124.0" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="400" fill="#475569">unencoded at the sink</text><rect x="590" y="176" width="210" height="90" rx="9" fill="#f5ecfe" stroke="#7e22ce" stroke-width="1.6"/><text x="695.0" y="205.0" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#0f172a">XssVectorLibrary</text><text x="695.0" y="221.0" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="400" fill="#475569">suggests viable vectors:</text><text x="695.0" y="237.0" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#7e22ce">";alert(document.domain)//</text><line x1="520" y1="150" x2="590" y2="110" stroke="#64748b" stroke-width="1.7" marker-end="url(#ah)"/><line x1="520" y1="170" x2="590" y2="205" stroke="#64748b" stroke-width="1.7" marker-end="url(#ah)"/><text x="30" y="286" font-size="11" fill="#475569" font-style="italic">Passive: observes only values the target already returned — nothing is injected.</text></svg>